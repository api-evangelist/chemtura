aid: chemtura
name: Chemtura
x-type: company
description: >-
  Chemtura Corporation was a global specialty chemicals company that
  developed, manufactured, and marketed chemical intermediates, additives,
  specialty chemicals, urethanes, organometallics, and modern plastics.
  In April 2017, Chemtura was acquired by LANXESS AG, the German specialty
  chemicals company headquartered in Cologne, and its operations were
  integrated into LANXESS's Performance Materials and other business
  segments. Chemtura products are now marketed and supported through
  LANXESS, which continues to serve agriculture, animal care, mobility,
  consumer goods, electrical and electronics, energy, food, and healthcare
  end markets.
